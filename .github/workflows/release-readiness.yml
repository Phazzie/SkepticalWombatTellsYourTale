name: Release Readiness

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-readiness-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    name: Quality Gates (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
    strategy:
      fail-fast: false
      matrix:
        node:
          - 18.x
          - 20.x
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Validate Prisma schema
        run: npx prisma validate
      - name: Check Prisma formatting
        run: npx prisma format --check
      - name: Check schema diff generation
        run: npx prisma migrate diff --from-empty --to-schema-datamodel prisma/schema.prisma --script > /tmp/prisma-schema.sql

  deploy-ready:
    name: Deploy Ready
    runs-on: ubuntu-latest
    needs:
      - quality-gates
    steps:
      - name: Confirm deployment gate passed
        run: echo "All quality gates passed. This job can be used to gate deployment workflows."
